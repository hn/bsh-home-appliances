# Input:
# https://github.com/hn/bsh-home-appliances/issues/10
# https://github.com/hn/bsh-home-appliances/blob/master/contrib/bsh-dbus-sn66p080eu.yaml

substitutions:
  manufacturer: Bosch
  model: SBV43M10EU
  type: dishwasher
  board: c6
  device_name: bsh-dbus-${type}-${board}
  name: bsh-dbus-${type}-${board}
  ap_fallback_ssid: bshd-$-{type}-${board}
  ap_fallback_password: "xxx"
  encryption_key: "yyy"
  ota_encryption_key: "zzz"
  uart:
    id: dbus_uart
    baud_rate: "9600"
    ESP_TX: 2
    ESP_RX: 3
  stat_led:
    pin: 15
    inverted: false
  rgb_led:
    pin: 8
    type: WS2812
    color: GRB

globals:
  - id: last_program_time
    type: int
    restore_value: false
    initial_value: '0'
  - id: last_program_id
    type: int
    restore_value: true
    initial_value: '0'

esphome:
  name: ${name}
  friendly_name: ${device_name}
  comment: Used to control your ${manufacturer} ${model} ${type} via Home Assistant.
  on_boot:
    priority: 800 # Very early
    then:
      - lambda: |-
          gpio_set_direction(GPIO_NUM_2, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_2, 1);

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:
  baud_rate: 0
  level: WARN # Or DEBUG if needed

# Enable Home Assistant API
api:
  encryption:
    key: ${encryption_key}

ota:
  - platform: esphome
    password: ${ota_encryption_key}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${ap_fallback_ssid}
    password: ${ap_fallback_password}

captive_portal:

external_components:
  - source: github://hn/bsh-home-appliances@master

uart:
  id: ${uart.id}
  rx_pin: ${uart.ESP_RX}
  tx_pin: ${uart.ESP_TX}
  baud_rate: ${uart.baud_rate}
  debug:
    direction: BOTH
    dummy_receiver: false
    after:
      delimiter: "\n"
    sequence:
      - lambda: UARTDebug::log_string(direction, bytes);

bshdbus:
  uart_id: ${uart.id}
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]
    - light.turn_on:
        id: status_led_rgb
        red: 0%
        green: 20%
        blue: 100%
    - delay: 20ms
    - light.turn_off: status_led_rgb

status_led:
  id: status
  pin:
    number: ${stat_led.pin}
    inverted: ${stat_led.inverted}

light:
  - platform: esp32_rmt_led_strip
    id: status_led_rgb
    name: "Onboard RGB LED"
    chipset: ${rgb_led.type}
    pin: ${rgb_led.pin}
    num_leds: 1
    rgb_order: ${rgb_led.color}

binary_sensor:
  - platform: bshdbus
    dest: 0x24
    command: 0x2006
    binary_sensors:
      - id: bsh_dw_rinse_aid
        name: Klarspüler
        icon: mdi:glass-cocktail
        lambda: return (x[0] >> 1) & 0x01;
      - id: bsh_dw_salt
        name: Salt
        icon: mdi:shaker-outline
        lambda: return (x[0] >> 0) & 0x01;
      - id: bsh_dw_door
        name: Tür
        device_class: door
        lambda: return !((x[0] >> 3) & 0x01);
  - platform: bshdbus
    dest: 0x17
    command: 0x1013
    binary_sensors:
      - id: bsh_dw_btn_start
        name: "Startknopf"
        icon: mdi:dishwasher
        lambda: return x[0] == 1;

sensor:
  - platform: wifi_signal
    name: "Wifi Signal"
    update_interval: 300s
  - platform: bshdbus
    dest: 0x25
    command: 0x2008
    sensors:
      - id: bsh_dw_remain
        name: Restzeit
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];
        on_value:
          then:
            - lambda: |-
                // nur speichern, wenn sinnvolle Restzeit
                // und Tür offen ODER Startknopf nicht gedrückt
                if (x > 0 && (id(bsh_dw_door).state || !id(bsh_dw_btn_start).state)) {
                  id(last_program_time) = (int)x;
                  ESP_LOGI("timer", "Gespeichert (über Restzeit): %d", id(last_program_time));
                }
  - platform: bshdbus
    dest: 0x17
    command: 0x1010
    sensors:
      - id: bsh_dw_program_id
        name: Program ID
        lambda: return x[0];
        internal: true
        icon: mdi:dishwasher
        on_value:
          then:
            - lambda: |-
                id(last_program_id) = (int)x;
                ESP_LOGI("program", "Gespeichertes Programm: %d", id(last_program_id));
  - platform: template
    id: bsh_dw_duration_total
    name: "Letzte eingestellte Laufzeit"
    lambda: return id(last_program_time);
    device_class: duration
    state_class: measurement
    unit_of_measurement: min
    accuracy_decimals: 0
    update_interval: 10s


text_sensor:
  - platform: template
    name: "Programm"
    id: bsh_dw_program_id_saved
    icon: mdi:dishwasher
    lambda: |-
      switch(id(last_program_id)) {
        case 10: return {"Intensiv 70°C"};
        case 13: return {"Auto 45-65°C"};
        case 14: return {"Eco 50°C"};
        case 17: return {"Kurzprogramm 45°C"};
        default: return {"Unbekannt"};
      }
    update_interval: 5s
  - platform: uptime
    name: Uptime
    icon: mdi:clock-check-outline
  - platform: template
    name: "Status"
    id: bsh_dw_status
    icon: mdi:play-pause
    update_interval: 5s
    lambda: |-
      if (id(bsh_dw_door).has_state() && id(bsh_dw_door).state) {
        return {"paused"};
      }
      if ((id(bsh_dw_door).has_state() && !id(bsh_dw_door).state) &&
         (id(bsh_dw_remain).has_state() && id(bsh_dw_remain).state > 0)) {
        return {"running"};
      }
      return {"idle"};