# Note: the board config is for https://github.com/Bouni/BSH-Board/ you
# might need to edit

esphome:
  name: bsh-dbus-B36CT80SNB
  friendly_name: bsh-dbus-B36CT80SNB

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: debug

api:
  encryption:
    key: !secret API_KEY

ota:
  - platform: esphome
    password: !secret ota_pwd

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://hn/bsh-home-appliances@master    

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

bshdbus:
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]
    - output.turn_on: activity_led
    - delay: 20ms
    - output.turn_off: activity_led

status_led:
  pin:
    number: GPIO06
    inverted: true

binary_sensor:
  - platform: bshdbus
    dest: 0x01
    command: 0x0204
    binary_sensors:
      - id: bsh_fr_left_door
        name: Left Door
        icon: mdi:door
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x10) && (x[1] == 0x01)){
            if (x[2] == 0x01) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_left_door).state;
      - id: bsh_fr_crisper_light
        name: Crisper Light
        icon: mdi:light
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x10) && (x[1] == 0x02)){
            if (x[2] == 0x01) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_crisper_light).state;
      - id: bsh_fr_control_light
        name: Control Light
        icon: mdi:door
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x10) && (x[1] == 0x03)){
            if (x[2] == 0x01) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_control_light).state;
      - id: bsh_fr_right_door
        name: Right Door
        icon: mdi:door
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x10) && (x[1] == 0x07)){
            if (x[2] == 0x01) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_right_door).state;
      - id: bsh_fr_freezer_door
        name: Freezer Door
        icon: mdi:door
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x10) && (x[1] == 0x00)){
            if (x[2] == 0x01) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_freezer_door).state;
      - id: bsh_fr_freezer_light
        name: Freezer Light
        icon: mdi:door
        lambda: |-
          if ((x.size() == 3) && (x[0] == 0x17) && (x[1] == 0x00)){
            if (x[2] == 0x02) {
              return true;
            }
            else {
              return false;
            }
          }
          return id(bsh_fr_freezer_light).state;
