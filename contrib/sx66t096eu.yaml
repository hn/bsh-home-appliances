esphome:
  name: sx66t096eu
  friendly_name: Dishwasher

external_components:
  - source: github://hn/bsh-home-appliances@master

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "xxx"

ota:
  - platform: esphome
    password: "xxx"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Dishwasher Fallback Hotspot"
    password: "xxx"

captive_portal:

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

status_led:
  pin:
    number: GPIO06
    inverted: true

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600
  
bshdbus:
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]

binary_sensor:
  - platform: bshdbus
    dest: 0x24
    command: 0x2006
    binary_sensors:
      - id: bsh_dw_rinse_aid
        name: Rinse Aid
        icon: mdi:glass-cocktail
        lambda: return (x[0] >> 1) & 0x01;
      - id: bsh_dw_salt
        name: Salt
        icon: mdi:shaker-outline
        lambda: return (x[0] >> 0) & 0x01;
      - id: bsh_dw_door
        name: Door
        device_class: door
        lambda: return !((x[0] >> 3) & 0x01);

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: Uptime 
  - platform: bshdbus
    dest: 0x25
    command: 0x2008
    sensors:
      - id: bsh_dw_remain
        name: Remaining Time
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];
