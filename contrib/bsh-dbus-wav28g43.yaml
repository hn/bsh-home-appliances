esphome:
  name: "bsh-board-waschmaschine"
  friendly_name: BSH Board Waschmaschine
  min_version: 2025.11.0
  name_add_mac_suffix: false

external_components:
  - source: github://hn/bsh-home-appliances@master


esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

time:
  - platform: homeassistant
    id: ha_time


# Enable Home Assistant API
api:
  encryption:
    key: !secret bsh-board-waschmaschine_api_key

# Allow Over-The-Air updates
ota:
- platform: esphome
  password: !secret bsh-board-waschmaschine_ota_password

#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password

openthread:
  device_type: MTD
  tlv: !secret openthread_tlv

network:
  enable_ipv6: true

# BSH Board config here

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

bshdbus:
  uart_id: dbus_uart
#  on_frame:
