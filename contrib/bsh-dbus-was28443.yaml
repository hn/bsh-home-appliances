esphome:
  name: bsh-dbus-was28443
  friendly_name: BSH washing machine WAS28443

external_components:
  - source: github://hn/bsh-home-appliances@master

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  # Dirty workaround because the machine's power supply unit cannot provide enough current:
  output_power: 10.5dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "D-Bus-Was28443 Fallback Hotspot"
    password: !secret wifi_ap_password

captive_portal:

web_server:
  port: 80
  version: 2
  local: true

uart:
  id: dbus_uart
  rx_pin: GPIO14
  baud_rate: 9600
  rx_buffer_size: 1024
  debug:
    direction: BOTH
    dummy_receiver: false

bshdbus:
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]

binary_sensor:
  - platform: bshdbus
    dest: 0x14
    command: 0x1007
    binary_sensors:
      - id: bsh_wm_feat_waterplus
        name: Spülen Plus
        icon: mdi:water-plus
        lambda: return (x[0] >> 4) & 0x01;
      - id: bsh_wm_feat_speedplus
        name: Speed Perfect
        icon: mdi:clock-fast
        lambda: |-
          int sensor_value = x[0];
            int mask = 0b01100000; // Mask for bits in positions 6 and 7
            if ((sensor_value & mask) == 0) {
                // The bits in positions 6 and 7 are at zero
                return 1;
            } else {
                // At least one of the bits is set to 1
                return 0;
            }
      - id: bsh_wm_feat_stains
        name: Eco Perfect
        icon: mdi:leaf
        lambda: return (x[0] >> 5) & 0x01;
      - id: bsh_wm_feat_prewash
        name: Vorwäsche
        icon: mdi:rotate-orbit
        lambda: return (x[0] >> 7) & 0x01;
      - id: bsh_wm_feat_anticrease
        name: Bügelleicht
        icon: mdi:iron
        lambda: return (x[1] >> 7) & 0x01;
  - platform: bshdbus
    dest: 0x15
    command: 0x1100
    binary_sensors:
      - id: bsh_wm_start_button
        name: Startknopf
        icon: mdi:button-pointer
        lambda: return 1;
        on_press:
          - delay: 1s
          - lambda: id(bsh_wm_start_button).publish_state(NAN);
  - platform: bshdbus
    dest: 0x26
    command: 0x1701
    binary_sensors:
      - id: bsh_wm_program_started
        name: Waschprogramm gestarted
        entity_category: diagnostic
        icon: mdi:ray-start-arrow
        lambda: return 1;
        on_press:
          - delay: 1s
          - lambda: id(bsh_wm_program_started).publish_state(NAN);

sensor:
  - platform: bshdbus
    dest: 0x14
    command: 0x1006
    sensors:
      - id: bsh_wm_rpm
        name: Schleuderdrehzahl
        device_class: speed
        state_class: measurement
        unit_of_measurement: rpm
        accuracy_decimals: 0
        lambda: return x[0];
        filters:
          - multiply: 10
          - lambda: |
              if (x > 1300) return 1400; //the 'marketing' max speed is higher than what the machine is actual capable of
              else return x;

  - platform: bshdbus
    dest: 0x16
    command: 0x3015
    sensors:
      - id: bsh_wm_rpm_ontime
        name: Umdrehungen (aktuell)
        entity_category: diagnostic
        accuracy_decimals: 0
        device_class: speed
        unit_of_measurement: rpm
        lambda: return (((int16_t) x[3] << 8 | x[4])/16);
    #  - id: bsh_wm_rpm_median
    #    name: Umdrehungen (gemittelt)
    #    entity_category: diagnostic
    #    accuracy_decimals: 0
    #    device_class: speed
    #    unit_of_measurement: rpm
    #    lambda: return (((int16_t) x[6] << 8 | x[7])/16);

  - platform: bshdbus
    dest: 0x17
    command: 0x4010
    sensors:
      - id: bsh_wm_unbalance_x
        name: Unwucht X
        entity_category: diagnostic
        icon: mdi:axis-x-rotate-clockwise
        accuracy_decimals: 0
        lambda: return (int16_t) ((x[1] << 8) | x[2]);
        filters:
          - throttle: 30s
          - timeout: 90s
      - id: bsh_wm_unbalance_z
        name: Unwucht Z
        entity_category: diagnostic
        icon: mdi:axis-z-rotate-clockwise
        accuracy_decimals: 0
        lambda: return (int16_t) ((x[3] << 8) | x[4]);
        filters:
          - throttle: 30s
          - timeout: 90s
      - id: bsh_wm_unbalance_y
        name: Unwucht Y
        entity_category: diagnostic
        icon: mdi:axis-y-rotate-clockwise
        accuracy_decimals: 0
        lambda: return (int16_t) ((x[5] << 8) | x[6]);
        filters:
          - throttle: 30s
          - timeout: 90s
  - platform: bshdbus
    dest: 0x2a
    command: 0x1600
    sensors:
      - id: bsh_wm_remain
        name: Restzeit
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];
  - platform: bshdbus
    dest: 0x14
    command: 0x1004
    sensors:
      - id: bsh_wm_temperature
        name: Temperatur
        icon: mdi:thermometer
        device_class: temperature
        state_class: measurement
        unit_of_measurement: °C
        accuracy_decimals: 0
        lambda: return x[0];
        filters:
          - calibrate_linear:
              method: exact
              datapoints:
                - 0 -> 0.0
                - 1 -> 20.0
                - 2 -> 30.0
                - 3 -> 40.0
                - 4 -> 60.0
                - 5 -> 70.0
                - 6 -> 80.0
                - 7 -> 90.0

text_sensor:
  - platform: bshdbus
    dest: 0x14
    command: 0x1005
    text_sensors:
      - id: bsh_wm_program
        name: Waschprogramm
        icon: mdi:numeric
        lambda: return std::to_string(x[2]);
        filters:
          - map:
            - 0 -> Aus
            - 1 -> Koch/Bunt
            - 2 -> Koch/Bunt + Vorwäsche
            - 3 -> Pflegeleicht
            - 4 -> Pflegeleicht + Vorwäsche
            - 5 -> Schnell/Mix
            - 6 -> Fein/Seide
            - 7 -> Wolle
            - 8 -> Spülen
            - 9 -> Schleudern
            - 10 -> Abpumpen
            - 11 -> Sanft Schleudern
            - 12 -> Extra Kurz 15'
            - 13 -> Sensitive
            - 14 -> Sportswear
            - 15 -> Pflegeleicht Plus
  - platform: bshdbus
    dest: 0x16
    command: 0x3015
    text_sensors:
      - id: bsh_wm_curr_rotdirection
        name: Aktuelle Laufrichtung
        entity_category: diagnostic
        icon: mdi:crop-rotate
        lambda: return std::to_string(x[2]);
        filters:
          - map:
            - 108 -> Rechtslauf
            - 114 -> Linkslauf
  - platform: bshdbus
    dest: 0x26
    command: 0x1200
    text_sensors:
      - id: bsh_wm_door
        name: Tür
        icon: mdi:door
        lambda: return std::to_string(x[0]);
        filters:
          - map:
            - 0 -> Zu und nicht verriegelt
            - 1 -> Zu und verriegelt
            - 2 -> Offen
  - platform: bshdbus
    dest: 0x26
    command: 0x1020
    text_sensors:
      - id: bsh_wm_washmodule
        name: Waschprogramm Modul
        entity_category: diagnostic
        icon: mdi:map-marker-path
        lambda: return std::to_string(x[0]);
        filters:
          - map:
            - 3 -> Waschmittel einspülen (3)
            - 4 -> Wassereinlauf (4)
            - 5 -> Aufheizen (5)
            - 6 -> Walken (6)
            - 9 -> Abpumpen / Schleudern (9)
            - 13 -> Spülen (13)
            - 15 -> Abpumpen / Schleudern (15)
            - 16 -> Spülen (16)
            - 20 -> Abpumpen / Schleudern  (20)
            - 23 -> Spülen (23)
            - 26 -> Endschleudern (26)
            - 28 -> Auflockern (28)
  - platform: bshdbus
    dest: 0x26
    command: 0x1101
    text_sensors:
      - id: bsh_wm_state
        name: Status
        icon: mdi:state-machine
        lambda: return std::to_string(x[0]);
        filters:
        - map:
          - 0 -> Angehalten/Bereit
          - 1 -> Fertig
          - 2 -> Läuft
    
