esphome:
  name: bsh-dbus-shxm78w56n
  friendly_name: bsh-dbus-shxm78w56n

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: debug

api:
  encryption:
    key: !secret API_KEY

ota:
  - platform: esphome
    password: !secret ota_pwd

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://hn/bsh-home-appliances@master    

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

bshdbus:
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]
    - output.turn_on: activity_led
    - delay: 20ms
    - output.turn_off: activity_led

status_led:
  pin:
    number: GPIO06
    inverted: true

binary_sensor:
  - platform: bshdbus
    dest: 0x24
    command: 0x2006
    binary_sensors:
      - id: bsh_dw_rinse_aid
        name: Rinse Aid
        icon: mdi:lotion-plus-outline
        lambda: return (x[0] >> 1) & 0x01;
      - id: bsh_dw_door
        name: Door
        device_class: door
        lambda: return !((x[0] >> 3) & 0x01);
  - platform: bshdbus
    dest: 0x17
    command: 0x1000
    binary_sensors:
      - id: bsh_dw_half_load
        name: Half Load
        icon: mdi:fraction-one-half
        lambda: return(x[1] >> 4) & 0x01;
      - id: bsh_dw_delicate
        name: Delicate
        icon: mdi:glass-cocktail
        lambda: return(x[1] >> 5) & 0x01;
      - id: bsh_dw_sanitize
        name: Sanitize
        icon: mdi:heating-coil
        lambda: return(x[1] >> 2) & 0x01;
      - id: bsh_dw_extra_dry
        name: Extra Dry
        icon: mdi:weather-sunny
        lambda: return(x[1] >> 1) & 0x01;

sensor:
  - platform: bshdbus
    dest: 0x25
    command: 0x2008
    sensors:
      - id: bsh_dw_remain
        name: Remaining Time
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];
      
text_sensor:
  - platform: bshdbus
    dest: 0x17
    command: 0x1011
    text_sensors:
      - id: bsh_dw_mode
        name: Mode
        icon: mdi:knob
        lambda: |-
          if (x[0] == 0x0a){
            return "Heavy";
          } else if (x[0] == 0x0d){
            return "Auto";
          } else if (x[0] == 0x0f){
            return "Eco";
          } else if (x[0] == 0x0e){
            return "Normal";
          } else if (x[0] == 0x15){
            return "Speed 60";
          } else if (x[0] == 0x12){
            return "Rinse";
          }
          return "Unknown";

