; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
framework = arduino

; PlatformIO's LDF chain pulls in WiFi and Networking libraries even without
; any WiFi code, because Arduino.h -> Client.h -> NetworkClient.h ->
; NetworkEvents.h contains 'friend class WiFiGenericClass', triggering LDF
; to chain in the entire WiFi stack (~630 KB flash).
; Comment out the following line if your board uses WiFi.
lib_ignore = WiFi, Networking

[wifi]
lib_deps =
  mathieucarbou/MycilaWebSerial@^8.2.3

;
; Board by kiu: https://github.com/kiu/BaSHi
; ESP32-C3 variant
;

[env:kiu-bashi-c3]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3

; To enable WiFi, uncomment extends, lib_ignore and set WIFI_* defines
; extends = wifi
; lib_ignore =

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D WSL_CUSTOM_PAGE
  -D DBUS_PIN_LED_HEARTBEAT=8
  -D DBUS_PIN_RX=10
  -D DBUS_PIN_TX=9
  ; -D WIFI_SSID=\"MyNetwork\"
  ; -D WIFI_PASS=\"MyPassword\"

board_upload.before_reset = usb-reset

;
; Board by Bouni: https://github.com/Bouni/BSH-Board
; ESP32-C6 needs the 'pioarduino' platform to support Arduino
;

[env:bouni-board]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1

; To enable WiFi, uncomment extends, lib_ignore and set WIFI_* defines
; extends = wifi
; lib_ignore =

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D WSL_CUSTOM_PAGE
  -D DBUS_PIN_LED_HEARTBEAT=6
  -D DBUS_PIN_LED_ACTIVITY=7
  -D DBUS_PIN_RX=4
  -D DBUS_PIN_TX=5
  ; -D WIFI_SSID=\"MyNetwork\"
  ; -D WIFI_PASS=\"MyPassword\"
  ; -D MQTT_BROKER=\"broker.hivemq.com\"
  ; -D MQTT_PORT=1883
  ; -D MQTT_USER=\"user\"
  ; -D MQTT_PASS=\"pass\"
  ; -D OTA_PASS=\"secret\"


